<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f4f6fb;
}

header {
  background: #0f172a;
  color: white;
  padding: 18px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 15px;
}

header a {
  color: white;
  text-decoration: none;
  font-size: 22px;
}

header h2 {
  margin: 0;
  font-size: 24px;
}

.user-box {
  font-size: 15px;
  font-weight: bold;
}

.logout-btn {
  background: transparent;
  color: white;
  border: 1px solid white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.container {
  padding: 20px;
}

.item {
  background: white;
  display: flex;
  gap: 18px;
  padding: 20px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  margin-bottom: 22px;
  align-items: flex-start;
}

.item img {
  width: 120px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  flex-shrink: 0;
}

.info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.info h3 {
  margin: 0;
  font-size: 22px;
}

.department {
  font-size: 16px;
  color: #555;
}

.addedby {
  font-size: 15px;
  color: #2563eb;
  font-weight: bold;
}

.remove-btn {
  align-self: flex-start;
  background: #dc2626;
  color: white;
  border: none;
  padding: 14px 22px;
  border-radius: 12px;
  font-size: 17px;
  cursor: pointer;
}

.clear-btn {
  background: black;
  color: white;
  border: none;
  padding: 14px 22px;
  border-radius: 12px;
  font-size: 17px;
  cursor: pointer;
  margin-bottom: 25px;
}

.empty {
  text-align: center;
  font-size: 20px;
  margin-top: 60px;
  color: #6b7280;
}
</style>
</head>

<body>

<header>
  <div class="left-header">
    <a href="/employee-list.html">←</a>
    <h2>🛒 List</h2>
  </div>

  <div>
    <span class="user-box" id="username"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <button class="clear-btn" onclick="clearCart()">Clear List</button>
  <div id="cart"></div>
</div>

<script>
const loggedUser = sessionStorage.getItem("username");

if (!loggedUser) {
  window.location.href = "/login.html";
}

document.getElementById("username").innerText = loggedUser;

const cartDiv = document.getElementById("cart");

/* LOAD CART */
async function loadCart() {
  try {
    const res = await fetch("/cart");
    const items = await res.json();

    cartDiv.innerHTML = "";

    if (!Array.isArray(items) || items.length === 0) {
      cartDiv.innerHTML = "<div class='empty'>List is empty</div>";
      return;
    }

    items.forEach(item => {
      if (!item.employee) return;

      cartDiv.innerHTML += `
        <div class="item">
          <img src="${item.employee.photo}" 
               onerror="this.src='https://via.placeholder.com/120x150?text=No+Image'">
          <div class="info">
            <h3>${item.employee.name}</h3>

            <div class="department">
              Department: ${item.employee.department || "Not Assigned"}
            </div>

            <div class="addedby">
              Added by: ${item.addedBy || "Unknown"}
            </div>

            <button class="remove-btn"
              onclick="removeItem('${item._id}')">
              Remove
            </button>
          </div>
        </div>
      `;
    });

  } catch (err) {
    cartDiv.innerHTML = "<div class='empty'>Failed to load list</div>";
  }
}

/* REMOVE ITEM */
async function removeItem(id) {
  await fetch(`/cart/${id}`, {
    method: "DELETE"
  });

  loadCart();
}

/* CLEAR CART */
async function clearCart() {
  await fetch("/cart", {
    method: "DELETE"
  });

  loadCart();
}

/* LOGOUT */
function logout() {
  sessionStorage.removeItem("username");
  window.location.href = "/login.html";
}

/* INIT */
loadCart();
</script>

</body>
</html>
