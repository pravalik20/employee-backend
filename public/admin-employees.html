<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin – Manage Employees</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f4f6fb;
  color: #111827;
}

header {
  background: #0f172a;
  color: white;
  padding: 16px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 20px;
  font-weight: 600;
}

header button {
  background: #dc2626;
  border: none;
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: 24px auto;
  padding: 0 20px 40px;
}

.add-box {
  background: white;
  padding: 24px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  margin-bottom: 30px;
}

.add-box input {
  width: 100%;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  font-size: 18px;
}

.add-box button {
  width: 100%;
  padding: 16px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

.add-box button:disabled {
  background: gray;
}

.progress {
  height: 8px;
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
  display: none;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #2563eb;
  transition: width 0.2s;
}

.search-bar {
  width: 100%;
  padding: 12px 16px;
  margin-bottom: 20px;
  border-radius: 12px;
  border: 1px solid #d1d5db;
  font-size: 16px;
}

.employee-card {
  background: white;
  padding: 20px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  display: flex;
  gap: 18px;
  margin-bottom: 22px;
  align-items: flex-start;
}

.employee-card img {
  width: 120px;
  height: 150px;
  object-fit: cover;
  border-radius: 12px;
}

.employee-info {
  flex: 1;
}

.department-text {
  color: #555;
  margin: 6px 0 10px;
}

.delete-btn {
  background: #dc2626;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

.employee-info button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 8px;
  margin-top: 10px;
}

.employee-info input {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  font-size: 16px;
}
</style>
</head>

<body>

<header>
  Admin Dashboard
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="add-box">
  <h3>Add Employee</h3>
  <input id="name" placeholder="Employee name">
  <input id="department" placeholder="Department">
  <input type="file" id="file" accept="image/*">
  <button id="addBtn" onclick="add()">Add Employee</button>

  <div class="progress" id="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<!-- SEARCH BAR -->
<input type="text" id="search" class="search-bar" placeholder="Search employees by name or department" oninput="filterEmployees()">

<div id="list"></div>

</div>

<script>
const ADMIN_KEY = sessionStorage.getItem("adminKey");
if (!ADMIN_KEY) window.location.href = "/admin-login.html";

/* IMAGE COMPRESSION */
async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => img.src = e.target.result;
    reader.readAsDataURL(file);

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX_WIDTH = 600;
      const scale = Math.min(1, MAX_WIDTH / img.width);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.6);
    };
  });
}

/* ADD EMPLOYEE */
async function add() {
  const name = document.getElementById("name").value.trim();
  const department = document.getElementById("department").value.trim();
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!name) return alert("Enter name");
  if (!department) return alert("Enter department");
  if (!file) return alert("Select image");

  const btn = document.getElementById("addBtn");
  const progress = document.getElementById("progress");
  const progressBar = document.getElementById("progressBar");

  btn.disabled = true;
  btn.textContent = "Uploading...";
  progress.style.display = "block";
  progressBar.style.width = "10%";

  try {
    const compressed = await compressImage(file);

    const cfg = await fetch("/cloudinary-config", {
      headers: { "x-admin-key": ADMIN_KEY }
    }).then(r => r.json());

    const fd = new FormData();
    fd.append("file", compressed);
    fd.append("upload_preset", cfg.uploadPreset);

    const img = await fetch(
      `https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,
      { method: "POST", body: fd }
    ).then(r => r.json());

    if (!img.secure_url) throw new Error("Cloudinary upload failed");

    progressBar.style.width = "70%";

    await fetch("/employees", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-key": ADMIN_KEY
      },
      body: JSON.stringify({
        name,
        department,
        photo: img.secure_url
      })
    });

    progressBar.style.width = "100%";

    document.getElementById("name").value = "";
    document.getElementById("department").value = "";
    fileInput.value = "";
    load();

  } catch (err) {
    console.error(err);
    alert("Upload failed.");
  }

  btn.disabled = false;
  btn.textContent = "Add Employee";
  progress.style.display = "none";
}

let allEmployees = []; // store employees for search filter

/* LOAD EMPLOYEES WITH EDIT/KEEP */
function load() {
  fetch("/employees")
    .then(r => r.json())
    .then(data => {
      allEmployees = data; // save for search
      renderList(data);
    });
}

/* RENDER EMPLOYEE LIST */
function renderList(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";
  data.forEach(e => {
    list.innerHTML += `
      <div class="employee-card" id="emp-${e._id}">
        <img src="${e.photo}" id="img-${e._id}">
        <div class="employee-info">
          <h3 id="name-${e._id}">${e.name}</h3>
          <div class="department-text" id="dept-${e._id}">
            Department: ${e.department || "Not set"}
          </div>
          <div id="edit-controls-${e._id}" style="display:none;">
            <input type="text" id="edit-name-${e._id}" value="${e.name}" placeholder="Name">
            <input type="text" id="edit-dept-${e._id}" value="${e.department}" placeholder="Department">
            <input type="file" id="edit-file-${e._id}" accept="image/*">
            <button onclick="save('${e._id}')">Save</button>
            <button onclick="cancelEdit('${e._id}')">Cancel</button>
          </div>
          <button onclick="edit('${e._id}')">Edit</button>
          <button class="delete-btn" onclick="del('${e._id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

/* FILTER EMPLOYEES BY SEARCH */
function filterEmployees() {
  const query = document.getElementById("search").value.toLowerCase();
  const filtered = allEmployees.filter(emp =>
    emp.name.toLowerCase().includes(query) ||
    (emp.department && emp.department.toLowerCase().includes(query))
  );
  renderList(filtered);
}

/* EDIT MODE */
function edit(id) {
  document.getElementById(`name-${id}`).style.display = "none";
  document.getElementById(`dept-${id}`).style.display = "none";
  document.getElementById(`edit-controls-${id}`).style.display = "block";
}

/* CANCEL EDIT */
function cancelEdit(id) {
  document.getElementById(`name-${id}`).style.display = "block";
  document.getElementById(`dept-${id}`).style.display = "block";
  document.getElementById(`edit-controls-${id}`).style.display = "none";
}

/* SAVE CHANGES */
async function save(id) {
  const newName = document.getElementById(`edit-name-${id}`).value.trim();
  const newDept = document.getElementById(`edit-dept-${id}`).value.trim();
  const fileInput = document.getElementById(`edit-file-${id}`);
  const file = fileInput.files[0];

  if (!newName) return alert("Name cannot be empty");

  let photoUrl = document.getElementById(`img-${id}`).src;

  if (file) {
    const compressed = await compressImage(file);
    const cfg = await fetch("/cloudinary-config", {
      headers: { "x-admin-key": ADMIN_KEY }
    }).then(r => r.json());

    const fd = new FormData();
    fd.append("file", compressed);
    fd.append("upload_preset", cfg.uploadPreset);

    const img = await fetch(
      `https://api.cloudinary.com/v1_1/${cfg.cloudName}/image/upload`,
      { method: "POST", body: fd }
    ).then(r => r.json());

    if (!img.secure_url) throw new Error("Cloudinary upload failed");
    photoUrl = img.secure_url;
  }

  await fetch(`/employees/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "x-admin-key": ADMIN_KEY
    },
    body: JSON.stringify({
      name: newName,
      department: newDept,
      photo: photoUrl
    })
  });

  load();
}

/* DELETE */
function del(id) {
  if (!confirm("Delete this employee?")) return;

  fetch(`/employees/${id}`, {
    method: "DELETE",
    headers: { "x-admin-key": ADMIN_KEY }
  }).then(load);
}

/* LOGOUT → REDIRECT TO EMPLOYEE LIST */
function logout() {
  sessionStorage.removeItem("adminKey");
  window.location.href = "/";
}

load();
</script>

</body>
</html>
